<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>tarefas</title>
</head>
<body>
    <header>
        <h1>Gerenciador de Tarefas</h1>
        <p class="subtitulo">Organize seu dia com estilo</p>
    </header>
    <main>
        <div class="nova-tarefa-container">
            <form id="form-nova-tarefa">
                <input type="text" id="nova-tarefa" placeholder="Adicione uma nova tarefa" aria-label="Nova tarefa" />
                <button type="button" id="status-tarefa" data-status="pendente" aria-pressed="false">Pendente</button>
                <div id="spinner" class="spinner" hidden aria-hidden="true" title="Carregando"></div>
                <button id="btn-adicionar" type="submit">Adicionar</button>
            </form>
            <span id="error-msg" class="error" hidden role="alert">Por favor, insira uma tarefa.</span>
        </div>
        <section>
            <h2>TAREFAS</h2>
            <section class="Tipos">
                <h2>Procure por tipos:</h2>
                <div class="dropdown-filtro">
                    <button class="dropdown-btn" id="dropdown-btn">
                        Todas <span class="dropdown-seta">▼</span>
                    </button>
                    <ul class="dropdown-lista" id="dropdown-lista">
                        <li class="dropdown-item ativo" data-value="todas">Todas</li>
                        <li class="dropdown-item" data-value="Pendentes">Pendentes</li>
                        <li class="dropdown-item" data-value="Feitas">Concluídas</li>
                    </ul>
                </div>
            </section>
            <section id="Pendentes">
                <ul></ul>
            </section>
            <section id="Feitos">
                <ul></ul>
            </section>
        </section>
    </main>
    <script src="script.js"></script>
    <footer>
        <p>2026 Gerenciador de Tarefas - Feito por:</p>
        <a href="https://github.com/AndreynaM0" target="_blank">https://github.com/AndreynaM0</a>
        <a href="https://github.com/garrousaa8" target="_blank">https://github.com/garrousaa8</a>
        <a href="https://github.com/MiroMachadim" target="_blank">https://github.com/MiroMachadim</a>
    </footer>
    <script src="botao.js"></script>
</body>
</html>
