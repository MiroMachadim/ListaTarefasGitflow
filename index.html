        <header>
            <h1>Gerenciador de Tarefas</h1>

                    <button type="button" id="status-tarefa" data-status="pendente" aria-pressed="false">Pendente</button>
                    <button id="btn-adicionar" type="submit">Adicionar</button>
                </form>
            </div>
            <section>
                <h2>TÍTULO 2</h2>
            </section>

                    <li><label><input type="checkbox" class="check-tarefa"> item:</label></li>
                    <li><label><input type="checkbox" class="check-tarefa"> item:</label></li>
                </ul>
            </section>

                    <li><label><input type="checkbox" class="check-tarefa"> item:</label></li>
